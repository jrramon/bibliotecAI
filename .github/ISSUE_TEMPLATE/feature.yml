name: Feature request
description: Suggest an idea or improvement.
labels: ["enhancement"]
body:
  - type: checkboxes
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the problem, not the solution. Who hurts today, and how?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would the ideal experience look like?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you didn't pick them.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, references.
