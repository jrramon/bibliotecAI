pre-commit:
  parallel: true
  commands:
    standardrb:
      glob: "*.{rb,rake}"
      run: bundle exec standardrb --fix {staged_files} && git add {staged_files}
    erb_lint:
      glob: "*.erb"
      run: bundle exec erb_lint {staged_files}
    tests_changed:
      glob: "{app,test,lib}/**/*"
      run: bin/rails test:changed
