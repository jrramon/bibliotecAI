<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="g1" cx="78%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#8B2E2A" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#8B2E2A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="12%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#8B2E2A" stop-opacity="0.05"/>
      <stop offset="60%" stop-color="#8B2E2A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- washi paper background -->
  <rect width="1200" height="630" fill="#FAF6EC"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>

  <!-- enormous kanji watermark, vermilion at low opacity -->
  <text x="1140" y="600"
        font-family="Georgia, 'Noto Serif', serif"
        font-size="640"
        font-weight="300"
        text-anchor="end"
        fill="#8B2E2A"
        opacity="0.10">函</text>

  <!-- eyebrow rule -->
  <line x1="80" y1="170" x2="135" y2="170" stroke="#8B2E2A" stroke-width="1.5" opacity="0.8"/>

  <!-- eyebrow text -->
  <text x="150" y="175"
        font-family="'Inter', system-ui, sans-serif"
        font-size="18"
        letter-spacing="5"
        fill="#8B2E2A">UNA BIBLIOTECA CON ALMA</text>

  <!-- main headline (two lines) -->
  <text x="80" y="290"
        font-family="Georgia, 'Noto Serif', serif"
        font-size="78"
        font-weight="300"
        fill="#1C1917">Tu biblioteca de casa,</text>
  <text x="80" y="380"
        font-family="Georgia, 'Noto Serif', serif"
        font-size="78"
        font-weight="400"
        font-style="italic"
        fill="#8B2E2A">conversando contigo.</text>

  <!-- sub copy -->
  <text x="80" y="460"
        font-family="Georgia, 'Noto Serif', serif"
        font-size="26"
        fill="#3F3A33">Comparte tus libros. Apunta deseos.</text>
  <text x="80" y="495"
        font-family="Georgia, 'Noto Serif', serif"
        font-size="26"
        fill="#3F3A33">Habla con tu biblioteca desde Telegram.</text>

  <!-- brand mark bottom-left -->
  <text x="80" y="580"
        font-family="'Inter', system-ui, sans-serif"
        font-size="20"
        font-weight="600"
        letter-spacing="3"
        fill="#1C1917">BIBLIOTECAI</text>
  <text x="290" y="580"
        font-family="'Inter', system-ui, sans-serif"
        font-size="16"
        fill="#8B7E68">· biblio.imagineourfutures.org</text>
</svg>
