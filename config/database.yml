default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  port: <%= ENV.fetch("DATABASE_PORT", 5432) %>
  username: <%= ENV.fetch("DATABASE_USERNAME", "rails_dev") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "aqwe123") %>

development:
  <<: *default
  database: bibliotecai_development

test:
  <<: *default
  database: bibliotecai_test

production:
  primary: &primary_production
    <<: *default
    database: bibliotecai_production
    username: bibliotecai
    password: <%= ENV["BIBLIOTECAI_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: bibliotecai_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: bibliotecai_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: bibliotecai_production_cable
    migrations_paths: db/cable_migrate
